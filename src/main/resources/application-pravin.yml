spring:
  application:
    name: jobs backend
  datasource:
    url: jdbc:postgresql://localhost:5432/jobportal_Db
    username: postgres
    password: 3333
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    protocol: smtp
    test-connection: false
  output:
    ansi:
      enabled: ALWAYS

logging:
  level:
    "[org.springframework.security]": WARN