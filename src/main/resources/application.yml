spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:pravin}  # Uses 'pravin' by default unless overridden
  output:
    ansi:
      enabled: always

server:
  port: ${PORT:8080}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  jwt:
    # Use JWT_SECRET in deployed environments. The fallback keeps local setup simple.
    secret: ${JWT_SECRET:TaK+HaV^uvCHEFsEVfypW#7g9^k*Z8$V}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  password-reset:
    expiry-minutes: ${PASSWORD_RESET_EXPIRY_MINUTES:30}
  async:
    # Thread pool used by @Async methods in AsyncConfig.
    # Keep this bounded so background work cannot create unlimited threads.
    core-pool-size: ${APP_ASYNC_CORE_POOL_SIZE:4}
    max-pool-size: ${APP_ASYNC_MAX_POOL_SIZE:10}
    queue-capacity: ${APP_ASYNC_QUEUE_CAPACITY:100}
