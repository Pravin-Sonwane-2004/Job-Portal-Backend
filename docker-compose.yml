version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: jobportal-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: jobportal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  springboot-app:
    build:
      context: .
      dockerfile: Dockerfile.pravin  # 🛠️ use Dockerfile.prod in production
    container_name: jobportal-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: pravin
      DB_URL: jdbc:postgresql://postgres:5432/jobportal
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      - .:/app     # sync local code with container (only for dev)
      - ~/.m2:/root/.m2
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
