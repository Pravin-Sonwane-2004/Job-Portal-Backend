version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: jobportal-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: jobportal
    ports:
      - "5432:5432"   # ✅ this is correct
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  springboot-app:
    build:
      context: .
      dockerfile: Dockerfile.pravin
    container_name: jobportal-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: pravin
      DB_URL: jdbc:postgresql://postgres:5432/jobportal
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
    depends_on:
      - postgres
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: jobportal-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"   # ✅ pgAdmin listens on port 5050
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
