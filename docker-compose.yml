version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: skillsync-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-skillsync}
      MYSQL_USER: ${SPRING_DATASOURCE_USERNAME}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  springboot-app:
    build:
      context: .
      dockerfile: Dockerfile.pravin
    container_name: skillsync-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: pravin
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-skillsync}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
    depends_on:
      - mysql
    networks:
      - app-network

  pgadmin:
    image: phpmyadmin:5
    container_name: skillsync-phpmyadmin
    environment:
      PMA_HOST: mysql
    ports:
      - "5050:80"
    depends_on:
      - mysql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
